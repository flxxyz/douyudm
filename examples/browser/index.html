<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>斗鱼弹幕 · flxxyz/douyudm</title>
  <meta name="description" content="基于 WebSocket 实时获取斗鱼弹幕，支持 Node.js 与浏览器。" />
  <meta name="keywords" content="斗鱼,弹幕,douyudm,douyu,danmu,websocket" />
  <meta property="og:title" content="斗鱼弹幕 · flxxyz/douyudm" />
  <meta property="og:description" content="基于 WebSocket 实时获取斗鱼弹幕，支持 Node.js 与浏览器。" />
  <meta property="og:url" content="https://github.com/flxxyz/douyudm" />
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/douyudm/dist/douyudm.browser.min.js"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React

    function App() {
      const [roomId, setRoomId] = useState('102965')
      const [status, setStatus] = useState('disconnected') // disconnected | connecting | connected
      const [messages, setMessages] = useState([])
      const clientRef = useRef(null)

      const connect = () => {
        if (!roomId.trim() || clientRef.current) return

        setStatus('connecting')
        setMessages([])

        const client = new douyudm.Client(roomId, { ignore: ['mrkl'] })

        client.on('connect', () => setStatus('connected'))

        client.on('disconnect', () => {
          setStatus('disconnected')
          clientRef.current = null
        })

        client.on('error', (c, err) => {
          setStatus('disconnected')
          setMessages(prev => [{ id: Date.now(), type: 'error', text: err.message }, ...prev])
          clientRef.current = null
        })

        client.on('chatmsg', (res) => {
          setMessages(prev => [{ id: Date.now(), type: 'chat', nn: res.nn, level: res.level, txt: res.txt }, ...prev])
        })

        client.on('uenter', (res) => {
          setMessages(prev => [{ id: Date.now(), type: 'enter', nn: res.nn }, ...prev])
        })

        client.run()
        clientRef.current = client
      }

      const disconnect = () => {
        clientRef.current = null
        setStatus('disconnected')
      }

      const statusText = { disconnected: '未连接', connecting: '连接中...', connected: `已连接到房间 ${roomId}` }
      const statusColor = { disconnected: '#888', connecting: '#fa0', connected: '#0a0' }

      return (
        <div style={{ fontFamily: 'sans-serif', maxWidth: 600, margin: '40px auto', padding: '0 16px' }}>
          <h2 style={{ marginBottom: 16 }}>斗鱼弹幕</h2>

          <div style={{ display: 'flex', gap: 8, marginBottom: 8 }}>
            <input
              type="number"
              value={roomId}
              onChange={e => setRoomId(e.target.value)}
              placeholder="输入房间号"
              disabled={status !== 'disconnected'}
              style={{ flex: 1, padding: '6px 10px', fontSize: 14, border: '1px solid #ccc', borderRadius: 4 }}
            />
            {status === 'disconnected'
              ? <button onClick={connect} style={{ padding: '6px 16px', background: '#f60', color: '#fff', border: 'none', borderRadius: 4, cursor: 'pointer' }}>连接</button>
              : <button onClick={disconnect} style={{ padding: '6px 16px', background: '#eee', color: '#333', border: 'none', borderRadius: 4, cursor: 'pointer' }}>断开</button>
            }
          </div>

          <div style={{ fontSize: 13, color: statusColor[status], marginBottom: 12 }}>
            {statusText[status]}
          </div>

          <ul style={{ listStyle: 'none', padding: 0 }}>
            {messages.map(msg => (
              <li key={msg.id} style={{ padding: '4px 0', borderBottom: '1px solid #eee', fontSize: 14 }}>
                {msg.type === 'chat' && <>
                  <span style={{ color: '#888', fontSize: 12 }}>lv.{msg.level}</span>{' '}
                  <span style={{ color: '#f60', fontWeight: 'bold' }}>{msg.nn}</span>: {msg.txt}
                </>}
                {msg.type === 'enter' && <>
                  <span style={{ color: '#f60', fontWeight: 'bold' }}>{msg.nn}</span>
                  <span style={{ color: '#888' }}> 进入了房间</span>
                </>}
                {msg.type === 'error' && <span style={{ color: 'red' }}>错误: {msg.text}</span>}
              </li>
            ))}
          </ul>
        </div>
      )
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />)
  </script>
</body>
</html>
