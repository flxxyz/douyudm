<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>斗鱼弹幕</title>
  <style>
    body { font-family: sans-serif; max-width: 600px; margin: 40px auto; }
    #danmu { list-style: none; padding: 0; }
    #danmu li { padding: 4px 0; border-bottom: 1px solid #eee; }
    .level { color: #888; font-size: 12px; }
    .name { color: #f60; font-weight: bold; }
  </style>
</head>
<body>
  <h2>房间 102965 弹幕</h2>
  <ul id="danmu"></ul>

  <script src="https://unpkg.com/douyudm/dist/douyudm.browser.min.js"></script>
  <script>
    const list = document.getElementById('danmu')

    const client = new douyudm.Client(102965, { ignore: ['mrkl'] })

    client.on('connect', (c) => console.log(`已连接到房间 ${c.roomId}`))
    client.on('disconnect', (c) => console.log(`已断开房间 ${c.roomId}`))
    client.on('error', (c, err) => console.error(`连接错误`, err))

    client.on('chatmsg', (res) => {
      const li = document.createElement('li')
      li.innerHTML = `<span class="level">lv.${res.level}</span> <span class="name">${res.nn}</span>: ${res.txt}`
      list.prepend(li)
    })

    client.on('uenter', (res) => {
      console.log(`${res.nn} 进入了房间`)
    })

    client.run()
  </script>
</body>
</html>
